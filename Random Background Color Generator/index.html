<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade Glow</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="card">

    <h1>🎓 Grade Glow</h1>
    <p>Enter your marks and see your result ✨</p>

    <input type="number" id="marks" placeholder="Enter marks (0 - 100)">

    <button onclick="calculateGrade()">Check Result</button>

    <div class="output">
        <div id="grade">Grade: --</div>
        <div id="status">Status: --</div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
